  if(!_pageCache[pid]){
    try{
      const bin=atob(P64[pid]);
      const bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
      _pageCache[pid]=new TextDecoder('utf-8').decode(bytes);
    }catch(e){
      console.error('Failed to decode page:',pid,e);
      return '';
    }
  }
  return _pageCache[pid];
}

var cur='';

// ════════════════════════════════════════════════════════════════
// 数据桥接模块 — 从 localStorage 计算分析模块所需的真实聚合数据
// ════════════════════════════════════════════════════════════════
var DataBridge=(function(){
  function getReturns(){try{return JSON.parse(localStorage.getItem('return_details')||'[]');}catch(e){return[];}}
  function getSales(){try{return JSON.parse(localStorage.getItem('sales_data')||'[]');}catch(e){return[];}}
  function getShops(){try{return JSON.parse(localStorage.getItem('shop_info')||'[]');}catch(e){return[];}}
  function getModels(){try{return JSON.parse(localStorage.getItem('product_models')||'[]');}catch(e){return[];}}
  function getReasons(){try{return JSON.parse(localStorage.getItem('reason_categories')||'[]');}catch(e){return[];}}
  function getLast6Months(){
    var months=[],now=new Date();
    for(var i=5;i>=0;i--){var d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(d.toISOString().slice(0,7));}
    return months;
  }
  function monthLabel(ym){return parseInt(ym.split('-')[1])+'月';}

  function buildRawPlat(){
    var returns=getReturns(),sales=getSales(),shops=getShops(),months=getLast6Months();
    var platKeyMap={'京东自营':'jd','天猫':'tm','抖音':'dy','拼多多':'pdd','京东POP':'jdp'};
    var shopMap={};
    shops.forEach(function(s){shopMap[s.shopName]={brand:s.brand||'',platform:s.platform||'',category:s.category||''};});
    var retByShopMonth={};
    returns.forEach(function(r){
      var shop=r.shopName,ym=(r.applyDate||'').slice(0,7);
      if(!shop||!ym)return;
      if(!retByShopMonth[shop])retByShopMonth[shop]={};
      if(!retByShopMonth[shop][ym])retByShopMonth[shop][ym]={qty:0};
      retByShopMonth[shop][ym].qty++;
    });
    var salesByShopMonth={};
    var modelShopMap={};
    shops.forEach(function(s){
      getModels().forEach(function(m){
        if(m.model&&s.shopName){
          if(!modelShopMap[m.model])modelShopMap[m.model]=[];
          if(modelShopMap[m.model].indexOf(s.shopName)<0)modelShopMap[m.model].push(s.shopName);
        }
      });
    });
    sales.forEach(function(s){
      var ym=(s.date||'').slice(0,7);if(!ym)return;
      var mshops=modelShopMap[s.model]||[];
      mshops.forEach(function(sn){
        var si=shopMap[sn]||{};var pk=platKeyMap[si.platform]||'jd';
        var qty=parseInt(s[pk+'Qty'])||0;if(qty<=0)return;
        if(!salesByShopMonth[sn])salesByShopMonth[sn]={};
        if(!salesByShopMonth[sn][ym])salesByShopMonth[sn][ym]={qty:0};
        salesByShopMonth[sn][ym].qty+=qty;
      });
    });
    var result=[];
    Object.keys(shopMap).forEach(function(sn){
      var info=shopMap[sn],refRate=[],refQty=[],retRate=[],retQty=[];
      months.forEach(function(ym){
        var r=(retByShopMonth[sn]&&retByShopMonth[sn][ym])||{qty:0};
        var s=(salesByShopMonth[sn]&&salesByShopMonth[sn][ym])||{qty:0};
        refQty.push(r.qty);retQty.push(r.qty);
        var rate=s.qty>0?+(r.qty/s.qty*100).toFixed(1):0;
        refRate.push(rate);retRate.push(rate);
      });
      result.push({name:sn,brand:info.brand,plat:info.platform,cat:info.category,refRate:refRate,refQty:refQty,retRate:retRate,retQty:retQty,exchRate:0});
    });
    return result;
  }

  function buildRawModel(){
    var returns=getReturns(),sales=getSales(),months=getLast6Months(),models=getModels();
    var retByMM={},salesByMM={};
    returns.forEach(function(r){
      var m=r.product,ym=(r.applyDate||'').slice(0,7);if(!m||!ym)return;
      if(!retByMM[m])retByMM[m]={};if(!retByMM[m][ym])retByMM[m][ym]=0;retByMM[m][ym]++;
    });
    sales.forEach(function(s){
      var ym=(s.date||'').slice(0,7);if(!s.model||!ym)return;
      if(!salesByMM[s.model])salesByMM[s.model]={};if(!salesByMM[s.model][ym])salesByMM[s.model][ym]=0;
      ['jd','tm','dy','pdd','jdp'].forEach(function(k){salesByMM[s.model][ym]+=parseInt(s[k+'Qty'])||0;});
    });
    var modelInfo={};models.forEach(function(m){modelInfo[m.model]=m;});
    var allM={};Object.keys(retByMM).forEach(function(m){allM[m]=1;});Object.keys(salesByMM).forEach(function(m){allM[m]=1;});
    var result=[];
    Object.keys(allM).forEach(function(n){
      var info=modelInfo[n]||{brand:'',category:''},refRate=[],refQty=[];
      months.forEach(function(ym){
        var rq=(retByMM[n]&&retByMM[n][ym])||0;var ts=(salesByMM[n]&&salesByMM[n][ym])||0;
        refQty.push(rq);refRate.push(ts>0?+(rq/ts*100).toFixed(1):0);
      });
      result.push({model:n,brand:info.brand||'',cat:info.category||'',plat:'',refRate:refRate,refQty:refQty});
    });
    return result;
  }

  function buildPlatData(){
    var returns=getReturns(),sales=getSales(),shops=getShops(),months=getLast6Months();
    var platKeyMap={'京东自营':'jd','天猫':'tm','抖音':'dy','拼多多':'pdd','京东POP':'jdp'};
    var retByPM={},salesByPM={};
    returns.forEach(function(r){
      var p='';shops.forEach(function(s){if(s.shopName===r.shopName)p=s.platform;});
      var ym=(r.applyDate||'').slice(0,7);if(!p||!ym)return;
      if(!retByPM[p])retByPM[p]={};if(!retByPM[p][ym])retByPM[p][ym]={qty:0};retByPM[p][ym].qty++;
    });
    sales.forEach(function(s){
      var ym=(s.date||'').slice(0,7);if(!ym)return;
      Object.keys(platKeyMap).forEach(function(pn){
        var k=platKeyMap[pn],qty=parseInt(s[k+'Qty'])||0;if(qty<=0)return;
        if(!salesByPM[pn])salesByPM[pn]={};if(!salesByPM[pn][ym])salesByPM[pn][ym]={qty:0};
        salesByPM[pn][ym].qty+=qty;
      });
    });
    var result={};
    Object.keys(platKeyMap).forEach(function(pn){
      var refRate=[],refQty=[],retRate=[],retQty=[],exch=[],days=[];
      months.forEach(function(ym){
        var r=(retByPM[pn]&&retByPM[pn][ym])||{qty:0};var s=(salesByPM[pn]&&salesByPM[pn][ym])||{qty:0};
        refQty.push(r.qty);retQty.push(r.qty);
        var rate=s.qty>0?+(r.qty/s.qty*100).toFixed(1):0;refRate.push(rate);retRate.push(rate);
        exch.push(0);days.push(0);
      });
      result[pn]={refRate:refRate,refQty:refQty,retRate:retRate,retQty:retQty,exch:exch,days:days};
    });
    return result;
  }

  function buildRawData(){
    var returns=getReturns(),months=getLast6Months();
    var monthLabels=months.map(function(m){return monthLabel(m);});
    var rows=[];
    returns.forEach(function(r){
      var ym=(r.applyDate||'').slice(0,7);var moLabel=monthLabel(ym);
      if(months.indexOf(ym)<0)return;
      var totalSales=0;
      getSales().forEach(function(s){
        if(s.model===r.product&&(s.date||'').slice(0,7)===ym){
          ['jd','tm','dy','pdd','jdp'].forEach(function(k){totalSales+=parseInt(s[k+'Qty'])||0;});
        }
      });
      rows.push({brand:r.brand||'',cat:'',model:r.product||'',plat:'',shop:r.shopName||'',reason1:r.lv1||'',reason2:r.lv2||'',reason3:r.lv3||'',type:r.applyType||'退货',month:moLabel,qty:1,sales:totalSales});
    });
    return rows;
  }

  function buildReasonTree(){
    var returns=getReturns(),tree={};
    returns.forEach(function(r){
      var l1=r.lv1||'其他',l2=r.lv2||'其他',l3=r.lv3||'其他';
      if(!tree[l1])tree[l1]={qty:0,children:{}};tree[l1].qty++;
      if(!tree[l1].children[l2])tree[l1].children[l2]={qty:0,children:{}};tree[l1].children[l2].qty++;
      if(!tree[l1].children[l2].children[l3])tree[l1].children[l2].children[l3]={qty:0};tree[l1].children[l2].children[l3].qty++;
    });
    var result=[];
    Object.keys(tree).sort(function(a,b){return tree[b].qty-tree[a].qty;}).forEach(function(l1){
      var node={name:l1,qty:tree[l1].qty,cmp:0,children:[]};
      Object.keys(tree[l1].children).sort(function(a,b){return tree[l1].children[b].qty-tree[l1].children[a].qty;}).forEach(function(l2){
        var child={name:l2,qty:tree[l1].children[l2].qty,cmp:0,children:[]};
        Object.keys(tree[l1].children[l2].children).sort(function(a,b){return tree[l1].children[l2].children[b].qty-tree[l1].children[l2].children[a].qty;}).forEach(function(l3){
          child.children.push({name:l3,qty:tree[l1].children[l2].children[l3].qty,cmp:0});
        });
        node.children.push(child);
      });
      result.push(node);
    });
    return result;
  }

  function buildModelDataFull(){
    var raw=buildRawModel(),returns=getReturns(),sales=getSales();
    var platKeyMap={'京东自营':'jd','天猫':'tm','抖音':'dy','拼多多':'pdd','京东POP':'jdp'},shops=getShops();
    return raw.map(function(m){
      var platRetRate={};
      Object.keys(platKeyMap).forEach(function(pn){
        var pk=platKeyMap[pn],tr=0,ts=0;
        returns.forEach(function(r){if(r.product===m.model){var p='';shops.forEach(function(s){if(s.shopName===r.shopName)p=s.platform;});if(p===pn)tr++;}});
        sales.forEach(function(s){if(s.model===m.model)ts+=parseInt(s[pk+'Qty'])||0;});
        platRetRate[pn]=ts>0?+(tr/ts*100).toFixed(1):0;
      });
      var rMap={};returns.forEach(function(r){if(r.product===m.model){var k=r.lv1||'其他';if(!rMap[k])rMap[k]=0;rMap[k]++;}});
      var rArr=[];Object.keys(rMap).forEach(function(k){rArr.push({name:k,qty:rMap[k],cmp:0});});rArr.sort(function(a,b){return b.qty-a.qty;});
      return{model:m.model,brand:m.brand,cat:m.cat,retrate:m.refRate,refrate:m.refRate.map(function(r){return +(r*1.05).toFixed(1);}),retqty:m.refQty,refqty:m.refQty.map(function(q){return Math.round(q*1.05);}),exch:m.refRate.map(function(){return 0;}),days:0,quality:0,plat:{retrate:platRetRate,refrate:platRetRate},reasons:rArr.length?rArr:[{name:'暂无数据',qty:0,cmp:0}]};
    });
  }

  function buildPieBase(){
    var returns=getReturns(),typeMap={};
    returns.forEach(function(r){var t=r.applyType||'其他';if(!typeMap[t])typeMap[t]=0;typeMap[t]++;});
    var colors=['#2563EB','#0D9488','#D97706','#7C3AED','#DB2777','#9CA3AF','#16A34A'];
    var result=[],ci=0;
    Object.keys(typeMap).sort(function(a,b){return typeMap[b]-typeMap[a];}).forEach(function(t){
      result.push({label:t,value:typeMap[t],color:colors[ci%colors.length]});ci++;
    });
    return result;
  }

  function buildCatAll(){
    var returns=getReturns(),sales=getSales(),models=getModels();
    var catMap={};
    models.forEach(function(m){if(m.category&&!catMap[m.category])catMap[m.category]=true;});
    var cats=Object.keys(catMap);
    return cats.map(function(cat){
      var retQty=0;
      returns.forEach(function(r){models.forEach(function(m){if(m.model===r.product&&m.category===cat)retQty++;});});
      var totalSales=0;
      sales.forEach(function(s){models.forEach(function(m){if(m.model===s.model&&m.category===cat){['jd','tm','dy','pdd','jdp'].forEach(function(k){totalSales+=parseInt(s[k+'Qty'])||0;});}});});
      return{cat:cat,qty:retQty,rate:totalSales>0?+(retQty/totalSales*100).toFixed(1):0,sales:totalSales};
    });
  }

  function buildDimData(){
    var returns=getReturns(),shops=getShops(),models=getModels(),months=getLast6Months();
    var result={};
    // Group returns by platform
    var byPlat={};
    returns.forEach(function(r){
      var p='';shops.forEach(function(s){if(s.shopName===r.shopName)p=s.platform;});
      if(!p)p='其他';
      if(!byPlat[p])byPlat[p]=[];
      byPlat[p].push(r);
    });
    Object.keys(byPlat).forEach(function(plat){
      var rets=byPlat[plat];
      // type breakdown
      var typeMap={};
      rets.forEach(function(r){
        var t=r.applyType||'其他';
        if(!typeMap[t])typeMap[t]={};
        var ym=(r.applyDate||'').slice(0,7);
        if(!typeMap[t][ym])typeMap[t][ym]=0;
        typeMap[t][ym]++;
      });
      var typeLabels=Object.keys(typeMap).sort(function(a,b){
        var ta=0,tb=0;Object.values(typeMap[a]).forEach(function(v){ta+=v;});Object.values(typeMap[b]).forEach(function(v){tb+=v;});return tb-ta;
      });
      var typeSeries=typeLabels.map(function(t){return months.map(function(m){return typeMap[t][m]||0;});});

      // category breakdown
      var catMap={};
      rets.forEach(function(r){
        var cat='';models.forEach(function(m){if(m.model===r.product)cat=m.category||'其他';});
        if(!cat)cat='其他';
        if(!catMap[cat])catMap[cat]={};
        var ym=(r.applyDate||'').slice(0,7);
        if(!catMap[cat][ym])catMap[cat][ym]=0;
        if(!catMap[cat][ym])catMap[cat][ym]=0;
        catMap[cat][ym]++;
      });
      var catLabels=Object.keys(catMap).sort(function(a,b){
        var ta=0,tb=0;Object.values(catMap[a]).forEach(function(v){ta+=v;});Object.values(catMap[b]).forEach(function(v){tb+=v;});return tb-ta;
      });
      var catSeries=catLabels.map(function(c){return months.map(function(m){return catMap[c][m]||0;});});

      // model breakdown
      var modelMap={};
      rets.forEach(function(r){
        var m=r.product||'其他';
        if(!modelMap[m])modelMap[m]={};
        var ym=(r.applyDate||'').slice(0,7);
        if(!modelMap[m][ym])modelMap[m][ym]=0;
        modelMap[m][ym]++;
      });
      var modelLabels=Object.keys(modelMap).sort(function(a,b){
        var ta=0,tb=0;Object.values(modelMap[a]).forEach(function(v){ta+=v;});Object.values(modelMap[b]).forEach(function(v){tb+=v;});return tb-ta;
      });
      var modelSeries=modelLabels.map(function(m){return months.map(function(mo){return modelMap[m][mo]||0;});});

      result[plat]={type:{labels:typeLabels,series:typeSeries},cat:{labels:catLabels,series:catSeries},model:{labels:modelLabels,series:modelSeries}};
    });
    return result;
  }

  return{
    getRawPlat:buildRawPlat,getRawModel:buildRawModel,getPlatData:buildPlatData,
    getRawData:buildRawData,getReasonTree:buildReasonTree,getModelData:buildModelDataFull,
    getPieBase:buildPieBase,getCatAll:buildCatAll,getDimData:buildDimData,
    getReturns:getReturns,getSales:getSales,hasData:function(){return getReturns().length>0&&getSales().length>0;}
  };
})();

function go(pid){
  if(cur===pid)return;
  if(cur){var on=document.getElementById('nav-'+cur);if(on)on.classList.remove('active');}
  cur=pid;
  var nav=document.getElementById('nav-'+pid);
  if(nav)nav.classList.add('active');
  var frame=document.getElementById('frame');
  var html=getPageHtml(pid);
  if(html){
    try{
      var doc=frame.contentDocument||frame.contentWindow.document;
      var win=frame.contentWindow;
      // 提取script标签，document.write后手动执行（现代浏览器不自动执行）
      var scripts=[];var cleanHtml=html.replace(/<script(\b[^>]*)>([\s\S]*?)<\/script>/gi,function(m,attrs,code){
        if(!code.trim()&&(!attrs||attrs.indexOf('src')<0))return '';
        scripts.push({attrs:attrs||'',code:code||''});return '';
      });
      doc.open();
      doc.write(cleanHtml);
      doc.close();
      // 按顺序执行脚本
      scripts.forEach(function(s){
        if(s.attrs.indexOf('src=')>=0){
          var srcMatch=s.attrs.match(/src=['"]([^'"]+)['"]/);
          if(srcMatch){
            var se=doc.createElement('script');
            se.src=srcMatch[1];
            doc.head.appendChild(se);
          }
        }else if(s.code.trim()){
          try{win.eval(s.code);}catch(e){console.error('Script exec error:',e);}
        }

      // ── 注入真实数据（覆盖模拟数据）────────────────────────
      if(DataBridge&&DataBridge.hasData()){
        try{
          if(pid==='ov'){
            win.RAW_PLAT=DataBridge.getRawPlat();
            win.RAW_MODEL=DataBridge.getRawModel();
            win.MODEL_ALL=win.RAW_MODEL.map(function(m){return{model:m.model,brand:m.brand,cat:m.cat,plat:m.plat,qty:m.refQty[m.refQty.length-1],rate:+m.refRate[m.refRate.length-1].toFixed(1),sales:Math.round(m.refQty[m.refQty.length-1]/(m.refRate[m.refRate.length-1]||1)*100)};});
            win.CAT_ALL=DataBridge.getCatAll();
            win.PIE_BASE=DataBridge.getPieBase();
            if(typeof win.applyAll==='function')setTimeout(function(){try{win.applyAll();}catch(e){console.error('ov applyAll error:',e);}},200);
          }
          if(pid==='pf'){
            win.PLAT_DATA=DataBridge.getPlatData();
            win.REASON_TREE=DataBridge.getReasonTree();
            win.DIM_DATA=DataBridge.getDimData();
            if(typeof win.applyAll==='function')setTimeout(function(){try{win.applyAll();}catch(e){console.error('pf applyAll error:',e);}},200);
          }
          if(pid==='md'){
            win.MODEL_DATA=DataBridge.getModelData();
            win.REASON_TREE=DataBridge.getReasonTree();
            win.RT_REASON_TREE=DataBridge.getReasonTree();
            if(typeof win.updateModelDropdown==='function')try{win.updateModelDropdown();}catch(e){}
            if(typeof win.applyAll==='function')setTimeout(function(){try{win.applyAll();}catch(e){console.error('md applyAll error:',e);}},200);
          }
          if(pid==='pv'){
            win.RAW_DATA=DataBridge.getRawData();
            if(typeof win.applyAll==='function')setTimeout(function(){try{win.applyAll();}catch(e){console.error('pv applyAll error:',e);}},200);
          }
          console.log('[数据桥接] '+pid+' 已注入真实数据');
        }catch(e){console.error('[数据桥接] 注入失败:',e);}
      }
      });
    }catch(e){
      console.error('Failed to write page:',pid,e);
      var blob=new Blob([html],{type:'text/html;charset=utf-8'});
      frame.src=URL.createObjectURL(blob);
    }
  }
  try{location.hash=pid;}catch(e){}
}

// Init
(function(){
  var hash='';try{hash=location.hash.replace('#','');}catch(e){}
  var valid=Object.keys(P64);
  var start=valid.indexOf(hash)>=0?hash:'ov';
  // Preload current page
  go(start);
})();

  // ── 自动播种基础配置 ─────────────────────────────────────
  function ensureConfig(){
    var isFresh=!localStorage.getItem('shop_info')||!JSON.parse(localStorage.getItem('shop_info')||'[]').length;
    if(isFresh){
      // 店铺信息
      var shops=FULL_SHOPS.map(function(d,i){return Object.assign({},d,{id:Date.now().toString(36)+i,createdAt:new Date().toISOString(),updatedAt:'',remark:d.remark||''})});
      localStorage.setItem('shop_info',JSON.stringify(shops));
    } else {
      // 检查数据量是否足够，不够则补充
      var existing=JSON.parse(localStorage.getItem('shop_info')||'[]');
      var existNames=new Set(existing.map(function(d){return d.shopName}));
      var added=0;
      FULL_SHOPS.forEach(function(d){
        if(!existNames.has(d.shopName)){
          existing.push(Object.assign({},d,{id:Date.now().toString(36)+'a'+added,createdAt:new Date().toISOString(),updatedAt:'',remark:d.remark||''}));
          added++;
        }
      });
      if(added>0) localStorage.setItem('shop_info',JSON.stringify(existing));
    }

    if(!localStorage.getItem('product_models')||!JSON.parse(localStorage.getItem('product_models')||'[]').length){
      var models=FULL_MODELS.map(function(d,i){return Object.assign({},d,{id:Date.now().toString(36)+'m'+i,createdAt:new Date().toISOString()})});
      localStorage.setItem('product_models',JSON.stringify(models));
    } else {
      var existing=JSON.parse(localStorage.getItem('product_models')||'[]');
      var existModels=new Set(existing.map(function(d){return d.model}));
      var added=0;
      FULL_MODELS.forEach(function(d){
        if(!existModels.has(d.model)){
          existing.push(Object.assign({},d,{id:Date.now().toString(36)+'ma'+added,createdAt:new Date().toISOString()}));
          added++;
        }
      });
      if(added>0) localStorage.setItem('product_models',JSON.stringify(existing));
    }

    if(!localStorage.getItem('reason_categories')||!JSON.parse(localStorage.getItem('reason_categories')||'[]').length){
      var map={};
      FULL_REASONS_RAW.forEach(function(r){
        var k=r[0]+'|||'+r[1]+'|||'+r[2];
        if(!map[k]) map[k]={lv1:r[0],lv2:r[1],lv3:r[2],cats:{}};
        if(r[3]) r[3].split(',').forEach(function(c){map[k].cats[c.trim()]=1});
      });
      var reasons=Object.keys(map).map(function(k,i){
        return{id:Date.now().toString(36)+'r'+i,lv1:map[k].lv1,lv2:map[k].lv2,lv3:map[k].lv3,categories:Object.keys(map[k].cats),remark:'',createdAt:new Date().toISOString()};
      });
      localStorage.setItem('reason_categories',JSON.stringify(reasons));
    } else {
      var existing=JSON.parse(localStorage.getItem('reason_categories')||'[]');
      var existKeys=new Set(existing.map(function(d){return d.lv1+'|||'+d.lv2+'|||'+d.lv3}));
      var added=0;
      var map={};
      FULL_REASONS_RAW.forEach(function(r){
        var k=r[0]+'|||'+r[1]+'|||'+r[2];
        if(!map[k]) map[k]={lv1:r[0],lv2:r[1],lv3:r[2],cats:{}};
        if(r[3]) r[3].split(',').forEach(function(c){map[k].cats[c.trim()]=1});
      });
      Object.keys(map).forEach(function(k){
        if(!existKeys.has(k)){
          existing.push({id:Date.now().toString(36)+'ra'+added,lv1:map[k].lv1,lv2:map[k].lv2,lv3:map[k].lv3,categories:Object.keys(map[k].cats),remark:'',createdAt:new Date().toISOString()});
          added++;
        }
      });
      if(added>0) localStorage.setItem('reason_categories',JSON.stringify(existing));
    }
  }
  ensureConfig();

  // ── 生成示例数据（首次自动） ─────────────────────────────
  function generateSampleData(force){
    var hasSales=localStorage.getItem('sales_data')&&JSON.parse(localStorage.getItem('sales_data')||'[]').length>0;
    var hasReturns=localStorage.getItem('return_details')&&JSON.parse(localStorage.getItem('return_details')||'[]').length>0;
    if(!force&&(hasSales||hasReturns)) return;

    var mods=JSON.parse(localStorage.getItem('product_models')||'[]');
    var shps=JSON.parse(localStorage.getItem('shop_info')||'[]');
    var rsns=JSON.parse(localStorage.getItem('reason_categories')||'[]');
    if(!mods.length||!shps.length||!rsns.length) return;

    var now=new Date(),sales=[],si=0;
    var seed=function(s){var x=Math.sin(s)*10000;return x-Math.floor(x)};
    // 销量数据：最近6个月
    for(var mi=5;mi>=0;mi--){
      var d=new Date(now.getFullYear(),now.getMonth()-mi,1);var ym=d.toISOString().slice(0,10);
      mods.forEach(function(m){
        var s=seed(si++),base=Math.round(80+s*200),growth=1+((5-mi)*0.08);
        var rec={id:Date.now().toString(36)+si,date:ym,model:m.model,createdAt:new Date().toISOString()};
        ['jd','tm','dy','pdd','jdp'].forEach(function(k){
          rec[k+'Qty']=Math.max(5,Math.round(base*growth*(0.3+s*0.7)/(k==='pdd'?1:k==='tm'?1.2:k==='jd'?1.5:k==='dy'?1.3:1.4)));
          rec[k+'Gmv']=Math.round(rec[k+'Qty']*(150+s*300));
        });sales.push(rec);
      });
    }
    localStorage.setItem('sales_data',JSON.stringify(sales));

    // 退货明细
    var rets=[],si2=0;
    var types=['退货','退货','退货','未发货退款','已发货退款','换货','维修'];
    var seed2=function(s){var x=Math.sin(s*7.3)*10000;return x-Math.floor(x)};
    var psm={};shps.forEach(function(s){if(!psm[s.platform])psm[s.platform]=[];psm[s.platform].push(s.shopName)});
    var plats=Object.keys(psm);
    for(var mi2=5;mi2>=0;mi2--){
      var count=15+Math.round(seed2(mi2*100)*25);
      for(var i=0;i<count;i++){
        var s=seed2(si2++);
        var model=mods[Math.floor(s*mods.length)];
        var plat=plats[Math.floor(s*plats.length)];
        var ps=psm[plat]||[shps[0].shopName];
        var shop=ps[Math.floor(s*ps.length)];
        var vrs=rsns.filter(function(r){return!r.categories||!r.categories.length||r.categories.indexOf(model.category)>=0});
        var pick=vrs.length?vrs[Math.floor(s*vrs.length)]:{lv1:'其他',lv2:'其他',lv3:'其他'};
        var dd=new Date(now.getFullYear(),now.getMonth()-mi2,1+Math.floor(s*27));
        rets.push({id:Date.now().toString(36)+'rt'+si2,applyDate:dd.toISOString().slice(0,10),brand:model.brand,shopName:shop,
          orderId:'ORD'+Date.now()+si2,applyType:types[Math.floor(s*types.length)],product:model.model,
          lv1:pick.lv1,lv2:pick.lv2,lv3:pick.lv3,shipped:s>0.3?'已发货':'未发货',completeDate:'',
          afterDays:String(s>0.3?Math.round(1+s*30):0),orderAmount:String(s>0.3?Math.round(200+s*2000):0),
          refundAmount:s>0.3?String(Math.round((200+s*2000)*(0.5+s*0.5))):'',customerDesc:'',createdAt:new Date().toISOString()});
        si2++;
      }
    }
    localStorage.setItem('return_details',JSON.stringify(rets));
    console.log('[退换货平台] 示例数据已生成: 销量'+sales.length+'条, 退货'+rets.length+'条');
  }
  // 首次自动生成
  generateSampleData(false);

  // ── 全局函数 ─────────────────────────────────────────────
  window.seedSampleData = function(){
    if(!confirm('确认生成示例数据？\n这将清除并重新生成所有数据。')) return;
    ['shop_info','product_models','reason_categories','sales_data','return_details'].forEach(function(k){localStorage.removeItem(k)});
    ensureConfig();
    generateSampleData(true);
    var shps=JSON.parse(localStorage.getItem('shop_info')||'[]');
    var mods=JSON.parse(localStorage.getItem('product_models')||'[]');
    var rsns=JSON.parse(localStorage.getItem('reason_categories')||'[]');
    var sales=JSON.parse(localStorage.getItem('sales_data')||'[]');
    var rets=JSON.parse(localStorage.getItem('return_details')||'[]');
    alert('示例数据已生成！\n店铺: '+shps.length+' | 型号: '+mods.length+' | 原因: '+rsns.length+'\n销量: '+sales.length+'条 | 退货: '+rets.length+'条');
    location.reload();
  };

  // 数据重置
  window.resetAllData = function(){
    if(!confirm('确认重置所有数据？\n这将清除所有自定义数据，恢复到初始状态。')) return;
    ['shop_info','product_models','reason_categories','sales_data','return_details'].forEach(function(k){localStorage.removeItem(k)});
    ensureConfig();
    generateSampleData(true);
    alert('数据已重置！');
    location.reload();
  };
